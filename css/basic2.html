<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 내부 스타일 시트 방식 -->
    <style>
        /* head 태그 내부, style 태그 내부 */
        /* css \코드 작성 영역 */

        h1 {
            color: red;
        }

        h3 {
            color: purple;
        }

    </style>

    <!-- 외부 스타일 시트 방식 -->
    <!-- css 파일을 만들어서 연결 -->
    <!-- 외부 스타일 시트 방식과 내부 스타일 시트 방식은 마지막 스타일이 적용됨 -->
    <link rel="stylesheet" href="basic.css">

</head>
<body>

    <h1>CSS Basic</h1>

    <!-- 인라인 스타일 방식 -->
    <!-- 인라인 스타일 방식 >>> 내부 스타일 시트 방식 -->
    <h1 style="color: blue;">CSS Basic</h1>
    <h1>CSS Basic</h1>

    <h2 style="color: darkcyan;">CSS h2 tag</h2>
    <h3>CSS h3 tag</h3>

    <h4>css h4 tag</h4>

</body>
</html>
