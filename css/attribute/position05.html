<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        .container {
            width: 400px;
            height: 400px;
            position: relative;
            margin: 50px;
        }

        .content {
            width: 400px;
            height: 400px;
            background-color: green;
        }

        .cloud-filter {
            position: absolute;
            width: 400px;
            height: 400px;
            background-color: lightgray;
            opacity: 0.4; /* 투명도 설정, 0은 완전히 투명, 1은 불투명 */
            top: 0;
            left: 0;
        }
        
    </style>
</head>
<body>
    
    <div class="container">
        <div class="content"></div>
        <div class="cloud-filter"></div>
    </div>

</body>
</html>
