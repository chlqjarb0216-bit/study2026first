<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* 전체선택자 -> 모든 요소에 기본 세팅 적용 */
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }

        body {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 700px;
            height: 500px;
            display: flex;
            flex-wrap: wrap;
            border: 3px solid black;
        }

        .nav {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-between;
        }
        .main-menu {
            width: 28%;
            background-color: red;
        }
        .my-page {
            width: 15%;
            background-color: red;
        }

        .main {
            width: 70%;
            height: 300px;
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            background-color: orange;
        }
        .content-line {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-evenly;
        }
        .content {
            width: 100px;
            height: 50px;
            background-color: black;
            transition: transform 0.3s ease;
        }

        .aside {
            width: 30%;
            height: 300px;
            background-color: green;
        }

        .footer {
            width: 100%;
            height: 100px;
            background-color: blue;
        }

        .text {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .content:hover {
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="main-menu text">메인메뉴</div>
            <div class="my-page text">마이페이지</div>
        </div>
        <div class="main">
            <div class="content-line">
                <div class="content"></div>
                <div class="content"></div>
                <div class="content"></div>
            </div>
            <div class="content-line">
                <div class="content"></div>
                <div class="content"></div>
                <div class="content"></div>
            </div>
        </div>
        <div class="aside text">aside</div>
        <div class="footer text">footer</div>
    </div>
</body>
</html>
